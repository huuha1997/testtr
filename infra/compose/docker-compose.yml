services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: agentic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentic"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    ports:
      - "9000:9000"
      - "9001:9001"
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio_data:/data

  orchestrator:
    build:
      context: ../..
      dockerfile: services/orchestrator/Dockerfile
    environment:
      HTTP_ADDR: 0.0.0.0:8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/agentic
      REDIS_URL: redis://redis:6379
      RUST_LOG: info
      SSE_HEARTBEAT_SECONDS: 5
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      OAUTH_BANANA_CLIENT_ID: banana-client-id
      OAUTH_BANANA_CLIENT_SECRET: banana-client-secret
      OAUTH_BANANA_AUTH_URL: https://example.com/oauth/authorize
      OAUTH_BANANA_TOKEN_URL: https://example.com/oauth/token
      OAUTH_BANANA_REVOKE_URL: https://example.com/oauth/revoke
      OAUTH_BANANA_REDIRECT_URL: http://localhost:8080/api/connections/banana/oauth/callback
      OAUTH_BANANA_SCOPES: design.generate
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  mcp-gateway:
    build:
      context: ../..
      dockerfile: services/mcp-gateway/Dockerfile
    environment:
      HTTP_ADDR: 0.0.0.0:8090
      RUST_LOG: info
    ports:
      - "8090:8090"

  design-worker:
    build:
      context: ../..
      dockerfile: workers/design/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/agentic
      REDIS_URL: redis://redis:6379
      RUST_LOG: info
      DESIGN_CONSUMER_NAME: design-worker-local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  spec-worker:
    build:
      context: ../..
      dockerfile: workers/spec/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/agentic
      REDIS_URL: redis://redis:6379
      RUST_LOG: info
      SPEC_CONSUMER_NAME: spec-worker-local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  codegen-worker:
    build:
      context: ../..
      dockerfile: workers/codegen/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/agentic
      REDIS_URL: redis://redis:6379
      RUST_LOG: info
      CODEGEN_CONSUMER_NAME: codegen-worker-local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ci-worker:
    build:
      context: ../..
      dockerfile: workers/ci/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/agentic
      REDIS_URL: redis://redis:6379
      RUST_LOG: info
      CI_CONSUMER_NAME: ci-worker-local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  deploy-worker:
    build:
      context: ../..
      dockerfile: workers/deploy/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/agentic
      REDIS_URL: redis://redis:6379
      RUST_LOG: info
      DEPLOY_CONSUMER_NAME: deploy-worker-local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
